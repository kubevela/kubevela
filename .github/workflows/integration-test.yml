name: Integration Test

on:
  push:
    branches:
      - master
      - release-*
  workflow_dispatch: {}
  pull_request:
    branches:
      - master
      - release-*

permissions:
  contents: read

env:
  # Common versions
  GO_VERSION: '1.23.8'

jobs:
  detect-noop:
    permissions:
      actions: write # for fkirc/skip-duplicate-actions to skip or stop workflow runs
    runs-on: ubuntu-22.04
    outputs:
      noop: ${{ steps.noop.outputs.should_skip }}
    steps:
      - name: Detect No-op Changes
        id: noop
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          paths_ignore: '["**.md", "**.mdx", "**.png", "**.jpg", "docs/**", "hack/website/**"]'
          do_not_skip: '["workflow_dispatch", "schedule", "push"]'
        continue-on-error: true

  integration-tests:
    runs-on: ubuntu-22.04
    needs: detect-noop
    if: needs.detect-noop.outputs.noop != 'true'

    steps:
      - name: Check out code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          submodules: true

      - name: Setup Environment
        uses: ./.github/actions/env-setup
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install envtest
        run: |
          echo "Installing envtest..."
          # Install a compatible version of setup-envtest for Go 1.23
          mkdir -p ./bin
          GOBIN=$(pwd)/bin go install sigs.k8s.io/controller-runtime/tools/setup-envtest@v0.0.0-20240320141353-395cfc7486e6
          echo "Envtest installed successfully"
          ls -la ./bin/

      - name: Run Integration Tests
        run: |
          echo "Running integration tests for core server..."
          make integration-test-core

      - name: Upload coverage report
        if: success()
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.txt
          flags: integration-tests
          name: codecov-integration
          fail_ci_if_error: false

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: integration-test-artifacts-${{ github.run_id }}
          path: |
            coverage*.txt
            **/*.log
            **/test*.out
          retention-days: 7

      # ========================================================================
      # Failure Diagnostics
      # ========================================================================
      - name: Collect failure diagnostics
        if: failure()
        run: |
          echo "=== INTEGRATION TEST FAILURE DIAGNOSTICS ==="
          echo "Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"

          echo ""
          echo "--- Go Environment ---"
          go version || true
          go env | grep -E "GOPATH|GOROOT|GOOS|GOARCH|CGO" || true

          echo ""
          echo "--- Envtest Environment ---"
          if [ -d "./bin" ]; then
            ls -la ./bin/ | grep -E "setup-envtest|kube-" || true
          fi

          echo ""
          echo "--- Test Artifacts ---"
          find . -name "*.log" -type f | head -20 || true
          find . -name "coverage*.txt" -type f || true

          echo ""
          echo "--- System Resources ---"
          df -h || true
          echo ""
          free -h || true

          echo "=== END DIAGNOSTICS ==="