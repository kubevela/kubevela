# Mixed Valid Outputs - K8s resources + non-K8s objects
# This should be ACCEPTED (non-K8s objects are ignored by validation)
apiVersion: core.oam.dev/v1beta1
kind: ComponentDefinition
metadata:
  name: test-mixed-outputs
  namespace: vela-system
  annotations:
    definition.oam.dev/description: "Test component with mixed K8s and non-K8s outputs - should be accepted"
spec:
  workload:
    definition:
      apiVersion: apps/v1
      kind: Deployment
  schematic:
    cue:
      template: |
        parameter: {
          name: string
          image: string | *"nginx:latest"
          replicas: int | *1
          environment: string | *"development"
        }
        
        output: {
          apiVersion: "apps/v1"
          kind: "Deployment"
          metadata: {
            name: parameter.name
            labels: {
              app: parameter.name
              environment: parameter.environment
            }
          }
          spec: {
            replicas: parameter.replicas
            selector: matchLabels: app: parameter.name
            template: {
              metadata: labels: app: parameter.name
              spec: containers: [{
                name: parameter.name
                image: parameter.image
              }]
            }
          }
        }
        
        outputs: {
          // Valid K8s resource - will be validated
          service: {
            apiVersion: "v1"
            kind: "Service"
            metadata: {
              name: parameter.name + "-svc"
              labels: app: parameter.name
            }
            spec: {
              selector: app: parameter.name
              ports: [{port: 80}]
            }
          }
          
          // Valid K8s resource - will be validated  
          configmap: {
            apiVersion: "v1"
            kind: "ConfigMap"
            metadata: {
              name: parameter.name + "-config"
              labels: app: parameter.name
            }
            data: {
              environment: parameter.environment
              replicas: "\(parameter.replicas)"
            }
          }
          
          // Non-K8s object - ignored by validation (no apiVersion/kind)
          applicationMetadata: {
            name: parameter.name
            environment: parameter.environment
            version: "1.0.0"
            features: ["logging", "monitoring", "tracing"]
            config: {
              timeout: 30
              retries: 3
              debug: parameter.environment == "development"
            }
          }
          
          // Non-K8s object - ignored by validation
          deploymentInfo: {
            timestamp: "2025-09-10T22:00:00Z"
            deployer: "kubevela"
            strategy: "rolling"
            healthcheck: {
              enabled: true
              path: "/health"
              interval: "10s"
            }
            scaling: {
              min: 1
              max: parameter.replicas * 3
              policy: "cpu-based"
            }
          }
          
          // Non-K8s object with nested structure - ignored
          monitoring: {
            metrics: {
              enabled: true
              port: 8080
              path: "/metrics"
              labels: {
                service: parameter.name
                environment: parameter.environment
              }
            }
            logging: {
              level: parameter.environment == "development" ? "debug" : "info"
              format: "json"
              rotation: {
                maxSize: "100MB"
                maxAge: 7
              }
            }
          }
        }