# Invalid TraitDefinition - references non-existent CRDs  
# This should be REJECTED by the webhook validation
apiVersion: core.oam.dev/v1beta1
kind: TraitDefinition
metadata:
  name: test-invalid-trait
  namespace: vela-system
  annotations:
    definition.oam.dev/description: "Test trait with non-existent CRDs - should be rejected"
spec:
  schematic:
    cue:
      template: |
        parameter: {
          minReplicas: int | *2
          maxReplicas: int | *10
          targetCPU: int | *80
        }
        
        outputs: {
          // Valid resource - HPA exists in standard K8s
          hpa: {
            apiVersion: "autoscaling/v2"
            kind: "HorizontalPodAutoscaler"
            metadata: name: context.name + "-hpa"
            spec: {
              scaleTargetRef: {
                apiVersion: "apps/v1"
                kind: "Deployment"
                name: context.name
              }
              minReplicas: parameter.minReplicas
              maxReplicas: parameter.maxReplicas
              metrics: [{
                type: "Resource"
                resource: {
                  name: "cpu"
                  target: {
                    type: "Utilization"
                    averageUtilization: parameter.targetCPU
                  }
                }
              }]
            }
          }
          
          // INVALID: This CRD does not exist
          customScaler: {
            apiVersion: "scaling.custom.io/v1alpha1"
            kind: "CustomScaler"
            metadata: name: context.name + "-scaler"
            spec: {
              targetRef: {
                apiVersion: "apps/v1"
                kind: "Deployment"
                name: context.name
              }
              minReplicas: parameter.minReplicas
              maxReplicas: parameter.maxReplicas
              scalingPolicy: "aggressive"
              metrics: {
                cpu: parameter.targetCPU
                memory: 70
              }
            }
          }
          
          // INVALID: Another non-existent monitoring CRD
          alerts: {
            apiVersion: "monitoring.example.io/v1"
            kind: "PrometheusRule" 
            metadata: name: context.name + "-alerts"
            spec: {
              groups: [{
                name: context.name + "-alerts"
                rules: [{
                  alert: "HighCPU"
                  expr: "cpu_usage > 90"
                  labels: {
                    severity: "warning"
                  }
                }]
              }]
            }
          }
        }