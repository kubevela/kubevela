apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: podinfo-no-values
spec:
  components:
    - name: podinfo
      type: helmchart
      properties:
        chart:
          source: podinfo
          repoURL: https://stefanprodan.github.io/podinfo
          version: "6.11.1"
        release:
          name: podinfo
          namespace: placeholder_ns
        options:
          createNamespace: true
          skipTests: true
