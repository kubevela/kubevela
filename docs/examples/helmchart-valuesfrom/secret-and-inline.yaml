# Three-layer merge example: ConfigMap (base) + Secret (overlay) + inline.
#
# Expected result after deploy:
#   - replicaCount:   2       (from inline — wins over everything)
#   - resources.cpu:  500m    (from Secret — wins over CM on conflict)
#   - resources.mem:  256Mi   (from CM — Secret didn't set it, preserved)
#   - ui.color:       #34577c (from CM — inline and Secret didn't set it)
#
# The Secret must exist before you apply the Application; see the
# folder README.md for a one-liner `kubectl create secret`.
apiVersion: v1
kind: ConfigMap
metadata:
  name: podinfo-base
data:
  values.yaml: |
    replicaCount: 1
    resources:
      limits:
        cpu: 100m
        memory: 256Mi
    ui:
      color: "#34577c"
---
apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: podinfo-layered
spec:
  components:
    - name: podinfo
      type: helmchart
      properties:
        chart:
          source: podinfo
          repoURL: https://stefanprodan.github.io/podinfo
          version: "6.11.1"
        release:
          name: podinfo-layered
          namespace: default
        values:
          replicaCount: 2
        valuesFrom:
          - kind: ConfigMap
            name: podinfo-base
          - kind: Secret
            name: podinfo-creds       # must exist — see README
            optional: true            # harmless if not yet created
        options:
          createNamespace: true
          skipTests: true
